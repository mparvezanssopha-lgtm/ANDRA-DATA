      products: [

    // Data lama pakai satu hargaBeli/hargaJual global untuk semua penjualan.
    // Migrasi ini mengubahnya jadi daftar produk tanpa menghapus riwayat transaksi.
    const migrateStore = (raw) => {
      if (raw && Array.isArray(raw.products)) {
        return { ...raw, notes: Array.isArray(raw.notes) ? raw.notes : [] }; // sudah skema baru
      }
      if (!raw) return defaultStore();

      const hargaSetorLama = raw.hargaBeli ?? 31000;
      const hargaJualLama = raw.hargaJual ?? 35000;
      const profitLama = hargaJualLama - hargaSetorLama;

      const products = [
        { id: "opak-standar", nama: "Opak", hargaSetor: hargaSetorLama, profitPerPcs: profitLama },
        { id: "opak-kotak-besar", nama: "Opak Kotak Besar", hargaSetor: 35000, profitPerPcs: 10000 },
      ];

      const transactions = (raw.transactions || []).map((t) => ({
        ...t,
        productId: "opak-standar",
        productNama: "Opak",
      }));

      return {
        paymentInfo: raw.paymentInfo || "",
        products,
        transactions,
        costs: raw.costs || [],
        notes: raw.notes || [],
      };

      "Januari", "Februari", "Maret", "April", "Mei", "Juni",
      "Juli", "Agustus", "September", "Oktober", "November", "Desember",
    ];

    const monthKeyOf = (isoDate) => isoDate.slice(0, 7);
    const formatMonthLabel = (monthKey) => {
      const [y, m] = monthKey.split("-").map(Number);
      return `${MONTH_NAMES[m - 1]} ${y}`;
    };

    function LaporanBulanan({ store }) {

    function LaporanTahunan({ store }) {
      const now = new Date();
      const currentYear = now.getFullYear();
      const [year, setYear] = useState(currentYear);

      const availableYears = useMemo(() => {
        const set = new Set([currentYear]);
        store.transactions.forEach((t) => set.add(Number(t.date.slice(0, 4))));
        return Array.from(set).sort((a, b) => a - b);
      }, [store.transactions]);

      const monthlyData = useMemo(() => {
        const MONTHS = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agu", "Sep", "Okt", "Nov", "Des"];
        return MONTHS.map((label, idx) => {
          const mk = `${year}-${String(idx + 1).padStart(2, "0")}`;
          const txs = store.transactions.filter((t) => monthKeyOf(t.date) === mk);
          const omset = txs.reduce((s, t) => s + t.omset, 0);
          const setoran = txs.reduce((s, t) => s + t.setoran, 0);
          const profit = omset - setoran;
          return { bulan: label, monthKey: mk, omset, setoran, profit };
        });
      }, [store.transactions, year]);

      const yearTotals = monthlyData.reduce(
        (acc, m) => ({
          omset: acc.omset + m.omset,
          setoran: acc.setoran + m.setoran,
          profit: acc.profit + m.profit,
        }),
        { omset: 0, setoran: 0, profit: 0 }
      );

      return (
        <div>
          <Card>
            <select value={year} onChange={(e) => setYear(Number(e.target.value))} style={inputStyle}>
              {availableYears.map((y) => (
                <option key={y} value={y}>{y}</option>
              ))}
            </select>
          </Card>

          <Card>
            <div style={{ fontSize: 11, color: COLORS.inkSoft, fontWeight: 600, marginBottom: 8 }}>
              PROFIT SETAHUN {year} (JAN–DES)
            </div>
            <div style={{ fontSize: 28, fontWeight: 700, color: COLORS.profit, marginBottom: 8 }}>
              {formatRp(yearTotals.profit)}
            </div>
            <hr style={{ borderColor: COLORS.primary, margin: "12px 0" }} />
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13 }}>
              <div>
                <div style={{ color: COLORS.inkSoft }}>Omset Setahun</div>
                <div style={{ fontWeight: 600 }}>{formatRp(yearTotals.omset)}</div>
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ color: COLORS.inkSoft }}>Total Setoran</div>
                <div style={{ fontWeight: 600, color: COLORS.primary }}>{formatRp(yearTotals.setoran)}</div>
              </div>
            </div>
          </Card>

          <h3 style={{ fontSize: 13, fontWeight: 600, margin: "16px 0 10px", color: COLORS.primary }}>
            Rincian per Bulan
          </h3>
          <Card>
            {monthlyData.map((m, i) => (
              <div
                key={m.monthKey}
                style={{
                  display: "flex",
                  justifyContent: "space-between",
                  alignItems: "center",
                  paddingBottom: 8,
                  marginBottom: 8,
                  borderBottom: i === monthlyData.length - 1 ? "none" : `1px solid ${COLORS.bg}`,
                  opacity: m.omset === 0 ? 0.45 : 1,
                }}
              >
                <span style={{ fontSize: 13, fontWeight: 500 }}>{formatMonthLabel(m.monthKey)}</span>
                <div style={{ display: "flex", gap: 10, fontSize: 12, fontFamily: "'JetBrains Mono', monospace" }}>
                  <span style={{ color: COLORS.primary, fontWeight: 600 }}>{formatRp(m.profit)}</span>
                </div>
              </div>
            ))}
          </Card>
        </div>
      );
    }

    // ====== TRANSAKSI ======
    function TabTransaksi({ store, persist }) {
      const [productId, setProductId] = useState(store.products[0]?.id || "");
      const [qty, setQty] = useState("");
      const [date, setDate] = useState(todayStr());

      const product = store.products.find((p) => p.id === productId);
      const q = parseFloat(qty);
      const canAdd = product && q > 0;

      const handleAdd = () => {
        if (!canAdd) return;
        const hargaJual = hargaJualOf(product);
        const omset = q * hargaJual;
        const setoran = q * product.hargaSetor;
        const profit = omset - setoran;

        const entry = {
          id: Date.now() + "-" + Math.random().toString(36).slice(2, 7),
          productId: product.id,
          productNama: product.nama,
          qty: q,
          date,
          omset,
          setoran,
          profit,
        };
        persist({ ...store, transactions: [entry, ...store.transactions] });
        setQty("");
      };

      if (store.products.length === 0) {
        return (
          <Card>
            <div style={{ textAlign: "center", color: COLORS.inkSoft }}>
              Belum ada produk. Tambahkan dulu di tab "Produk".
            </div>
          </Card>
        );
      }

      return (
        <div>
          <Card>
            <label style={{ display: "block", fontSize: 12, color: COLORS.inkSoft, marginBottom: 6 }}>
              Produk
            </label>
            <select value={productId} onChange={(e) => setProductId(e.target.value)} style={inputStyle}>
              {store.products.map((p) => (
                <option key={p.id} value={p.id}>
                  {p.nama} — Jual {formatRp(hargaJualOf(p))} / Setor {formatRp(p.hargaSetor)}
                </option>
              ))}
            </select>

            <label style={{ display: "block", fontSize: 12, color: COLORS.inkSoft, marginTop: 10, marginBottom: 6 }}>
              Jumlah Terjual (pcs)
            </label>
            <input
              type="number"
              inputMode="decimal"
              placeholder="0"
              value={qty}
              onChange={(e) => setQty(e.target.value)}
              style={inputStyle}
            />

            <label style={{ display: "block", fontSize: 12, color: COLORS.inkSoft, marginTop: 10, marginBottom: 6 }}>
              Tanggal
            </label>
            <input
              type="date"
              value={date}
              onChange={(e) => setDate(e.target.value)}
              style={inputStyle}
            />

            {canAdd && (
              <div style={{ fontSize: 13, color: COLORS.inkSoft, marginTop: 10, marginBottom: 10 }}>
                <div>Omset: <strong style={{ color: COLORS.ink }}>{formatRp(q * hargaJualOf(product))}</strong></div>
                <div>Setoran: <strong style={{ color: COLORS.primary }}>{formatRp(q * product.hargaSetor)}</strong></div>
                <div>Profit Anda: <strong style={{ color: COLORS.profit }}>{formatRp(q * product.profitPerPcs)}</strong></div>
              </div>
            )}

            <button onClick={handleAdd} disabled={!canAdd} style={buttonStyle(canAdd)}>
              Catat Penjualan
            </button>
          </Card>

          <h3 style={{ fontSize: 13, fontWeight: 600, margin: "16px 0 10px", color: COLORS.primary }}>
            Riwayat Penjualan
          </h3>
          <Card>
            {store.transactions.length === 0 ? (
              <div style={{ textAlign: "center", color: COLORS.inkSoft }}>Belum ada penjualan</div>
            ) : (
              store.transactions.map((t, i) => (
                <div
                  key={t.id}
                  style={{
                    display: "flex",
                    justifyContent: "space-between",
                    alignItems: "center",
                    paddingBottom: 8,
                    marginBottom: 8,
                    borderBottom: i === store.transactions.length - 1 ? "none" : `1px solid ${COLORS.bg}`,
                  }}
                >
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 13, fontWeight: 600 }}>
                      {t.productNama} · {t.date} · {t.qty} pcs
                    </div>
                    <div style={{ fontSize: 12, color: COLORS.inkSoft }}>
                      Jual {formatRp(t.omset)} | Setor {formatRp(t.setoran)}
                    </div>
                  </div>
                  <button
                    onClick={() => persist({ ...store, transactions: store.transactions.filter((x) => x.id !== t.id) })}
                    style={{
                      background: "none",
                      border: "none",
                      color: COLORS.primary,
                      cursor: "pointer",
                      fontSize: 18,
                      padding: "4px 8px",
                    }}
                    title="Hapus"
                  >
                    ✕
                  </button>
                </div>
              ))
            )}
          </Card>
        </div>
      );

    // ====== PRODUK ======
    function TabProduk({ store, persist }) {
      const [nama, setNama] = useState("");
      const [hargaSetor, setHargaSetor] = useState("");
      const [profitPerPcs, setProfitPerPcs] = useState("");

      const canAdd = nama.trim() && parseFloat(hargaSetor) >= 0 && parseFloat(profitPerPcs) >= 0;

      return (
        <div>
          <h3 style={{ fontSize: 13, fontWeight: 600, margin: "0 0 10px", color: COLORS.primary }}>
            🛍️ Barang & Harga Jualan Anda
          </h3>
          <Card>
            {store.products.length === 0 ? (
              <div style={{ textAlign: "center", color: COLORS.inkSoft }}>Belum ada produk</div>
            ) : (
              store.products.map((p) => (
                <div key={p.id} style={{ paddingBottom: 10, marginBottom: 10, borderBottom: `1px solid ${COLORS.bg}` }}>
                  <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
                    <input type="text" defaultValue={p.nama} placeholder="Nama barang" onChange={(e) => {
                      const products = store.products.map((x) => x.id === p.id ? { ...x, nama: e.target.value } : x);
                      persist({ ...store, products });
                    }} style={{ ...inputStyle, flex: 1, marginBottom: 0 }} />
                    <button
                      onClick={() => persist({ ...store, products: store.products.filter((x) => x.id !== p.id) })}
                      style={{ background: "none", border: "none", color: COLORS.primary, cursor: "pointer", fontSize: 18, padding: "4px 8px", minWidth: "auto" }}
                      title="Hapus produk"
                    >
                      ✕
                    </button>
                  </div>
                  <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
                    <div style={{ flex: 1 }}>
                      <label style={{ display: "block", fontSize: 11, color: COLORS.inkSoft, marginBottom: 4 }}>Harga Setor ke Abang Raja</label>
                      <input type="number" defaultValue={p.hargaSetor} onChange={(e) => {
                        const products = store.products.map((x) => x.id === p.id ? { ...x, hargaSetor: parseFloat(e.target.value) || 0 } : x);
                        persist({ ...store, products });
                      }} style={{ ...inputStyle, marginBottom: 0 }} />
                    </div>
                    <div style={{ flex: 1 }}>
                      <label style={{ display: "block", fontSize: 11, color: COLORS.inkSoft, marginBottom: 4 }}>Keuntungan Anda / pcs</label>
                      <input type="number" defaultValue={p.profitPerPcs} onChange={(e) => {
                        const products = store.products.map((x) => x.id === p.id ? { ...x, profitPerPcs: parseFloat(e.target.value) || 0 } : x);
                        persist({ ...store, products });
                      }} style={{ ...inputStyle, marginBottom: 0 }} />
                    </div>
                  </div>
                  <div style={{ fontSize: 12, color: COLORS.inkSoft }}>
                    Harga jual ke pembeli (otomatis): <strong style={{ color: COLORS.ink }}>{formatRp(hargaJualOf(p))}</strong> / pcs
                  </div>
                </div>
              ))
            )}
          </Card>

          <Card style={{ marginTop: 16 }}>
            <label style={{ display: "block", fontSize: 12, color: COLORS.inkSoft, marginBottom: 6 }}>Nama Barang Baru</label>
            <input type="text" placeholder="mis. Opak Kotak Besar" value={nama} onChange={(e) => setNama(e.target.value)} style={inputStyle} />

            <label style={{ display: "block", fontSize: 12, color: COLORS.inkSoft, marginBottom: 6 }}>Harga Setor ke Abang Raja (Rp)</label>
            <input type="number" inputMode="decimal" placeholder="0" value={hargaSetor} onChange={(e) => setHargaSetor(e.target.value)} style={inputStyle} />

            <label style={{ display: "block", fontSize: 12, color: COLORS.inkSoft, marginBottom: 6 }}>Keuntungan yang Anda Inginkan / pcs (Rp)</label>
            <input type="number" inputMode="decimal" placeholder="0" value={profitPerPcs} onChange={(e) => setProfitPerPcs(e.target.value)} style={inputStyle} />

            {parseFloat(hargaSetor) >= 0 && parseFloat(profitPerPcs) >= 0 && (
              <div style={{ fontSize: 12, color: COLORS.inkSoft, marginBottom: 10 }}>
                Harga jual ke pembeli: <strong style={{ color: COLORS.ink }}>
                  {formatRp((parseFloat(hargaSetor) || 0) + (parseFloat(profitPerPcs) || 0))}
                </strong> / pcs
              </div>
            )}

            <button onClick={() => {
              if (canAdd) {
                const id = nama.trim().toLowerCase().replace(/\s+/g, "-") + "-" + Date.now();
                persist({
                  ...store,
                  products: [...store.products, {
                    id,
                    nama: nama.trim(),
                    hargaSetor: parseFloat(hargaSetor) || 0,
                    profitPerPcs: parseFloat(profitPerPcs) || 0,
                  }],
                });
                setNama("");
                setHargaSetor("");
                setProfitPerPcs("");
              }
            }} style={buttonStyle(canAdd)}>
              Tambah Barang
            </button>
          </Card>
        </div>
      );
    }

    // ====== CATATAN ======
    function TabCatatan({ store, persist }) {
      const [judul, setJudul] = useState("");
      const [isi, setIsi] = useState("");

      const notes = store.notes || [];
      const canAdd = isi.trim().length > 0;

      const handleAdd = () => {
        if (!canAdd) return;
        const entry = {
          id: Date.now() + "-" + Math.random().toString(36).slice(2, 7),
          judul: judul.trim(),
          isi: isi.trim(),
          tanggal: todayStr(),
        };
        persist({ ...store, notes: [entry, ...notes] });
        setJudul("");
        setIsi("");
      };

      return (
        <div>
          <h3 style={{ fontSize: 13, fontWeight: 600, margin: "0 0 10px", color: COLORS.primary }}>
            📝 Catatan Pribadi
          </h3>
          <Card>
            <label style={{ display: "block", fontSize: 12, color: COLORS.inkSoft, marginBottom: 6 }}>
              Judul (opsional)
            </label>
            <input
              type="text"
              placeholder="mis. Titip ke Bu Sari"
              value={judul}
              onChange={(e) => setJudul(e.target.value)}
              style={inputStyle}
            />

            <label style={{ display: "block", fontSize: 12, color: COLORS.inkSoft, marginBottom: 6 }}>
              Isi Catatan
            </label>
            <textarea
              placeholder="Tulis catatan tentang penjualan opak di sini..."
              value={isi}
              onChange={(e) => setIsi(e.target.value)}
              rows={4}
              style={{ ...inputStyle, resize: "vertical", fontFamily: "'Work Sans', sans-serif" }}
            />

            <button onClick={handleAdd} disabled={!canAdd} style={buttonStyle(canAdd)}>
              Simpan Catatan
            </button>
          </Card>

          <h3 style={{ fontSize: 13, fontWeight: 600, margin: "16px 0 10px", color: COLORS.primary }}>
            Riwayat Catatan
          </h3>
          <Card>
            {notes.length === 0 ? (
              <div style={{ textAlign: "center", color: COLORS.inkSoft }}>Belum ada catatan</div>
            ) : (
              notes.map((n, i) => (
                <div
                  key={n.id}
                  style={{
                    paddingBottom: 10,
                    marginBottom: 10,
                    borderBottom: i === notes.length - 1 ? "none" : `1px solid ${COLORS.bg}`,
                  }}
                >
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
                    <div style={{ flex: 1 }}>
                      {n.judul && (
                        <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 2 }}>{n.judul}</div>
                      )}
                      <div style={{ fontSize: 11, color: COLORS.inkSoft, marginBottom: 4 }}>{n.tanggal}</div>
                      <div style={{ fontSize: 13, whiteSpace: "pre-wrap" }}>{n.isi}</div>
                    </div>
                    <button
                      onClick={() => persist({ ...store, notes: notes.filter((x) => x.id !== n.id) })}
                      style={{
                        background: "none",
                        border: "none",
                        color: COLORS.primary,
                        cursor: "pointer",
                        fontSize: 18,
                        padding: "4px 8px",
                        flexShrink: 0,
                      }}
                      title="Hapus"
                    >
                      ✕
                    </button>
                  </div>
                </div>
              ))
            )}
          </Card>
        </div>
      );
    }

    // ====== UI Components ======
    function Card({ children, style }) {
      return (
        <div
          style={{
            background: COLORS.card,
            border: `1px solid ${COLORS.primary}`,
            borderRadius: 12,
            padding: 16,
            marginBottom: 16,
            ...style,
          }}
        >
          {children}
        </div>
      );
    }

    const inputStyle = {
      width: "100%",
      boxSizing: "border-box",
      padding: "8px 10px",
      fontSize: 13,
      border: `1px solid ${COLORS.primary}`,
      borderRadius: 6,
      background: "white",
      color: COLORS.ink,
      fontFamily: "'Work Sans', sans-serif",
      outline: "none",
      marginBottom: 10,
    };

    function buttonStyle(enabled) {
      return {
        width: "100%",
        padding: "10px 0",
        border: "none",
        borderRadius: 8,
        background: enabled ? COLORS.primary : "#D7CCC8",
        color: "white",
        fontWeight: 600,
        fontSize: 13,
        cursor: enabled ? "pointer" : "not-allowed",
        marginTop: 10,
      };
    }

    // ====== RENDER ======
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<AndraOpakApp />);
  </script>
</body>
</html>
